version: '3.8'

services:
  # Наш новый сервер базы данных PostgreSQL
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user        # логин
      POSTGRES_PASSWORD: password # пароль
      POSTGRES_DB: store_db      # название базы
    ports:
      - "5432:5432"
    restart: always

  catalog-service:
    build: ./catalog_service
    ports:
      - "8001:8001"
    depends_on:
      - db  # Каталог не запустится, пока не включится база данных
    restart: always

  order-service:
    build: ./order_service
    ports:
      - "8002:8002"
    depends_on:
      - db  # Заказы тоже ждут базу данных
    restart: always