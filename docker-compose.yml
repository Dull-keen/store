services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: store_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  catalog-service:
    build: ./catalog_service
    ports:
      - "8001:8001"
    depends_on:
      - db
    restart: always

  order-service:
    build: ./order_service
    ports:
      - "8002:8002"
    depends_on:
      - db
    restart: always
    
volumes:
  pgdata: